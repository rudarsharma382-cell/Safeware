<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEWARE — AI-Powered Responsive Road Safety System</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            obsidian: '#03050A',
                            slate: '#120B24',
                            cyan: '#00FFCC',

    </script>
    <!-- Google Fonts: Space Grotesk, Syne & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@750;800&family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Framer Motion CDN -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Babel standalone JSX compiler -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Global cursor override */
        * {
            cursor: none !important;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #03050A;
            color: #f3f4f6;
            overflow-x: hidden;
        }
        .hud-grid {
            background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Thin capsule neon scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(11, 15, 25, 0.5);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #00FFCC, #120B24);
            border-radius: 9999px;
            box-shadow: 0 0 6px rgba(0, 255, 204, 0.5);
        }
        .data-flow-line {
            stroke-dasharray: 8, 6;
            animation: flow 1.2s linear infinite;
        }
        @keyframes flow {
            to { stroke-dashoffset: -20; }
        }
        .laser-line {
            background: linear-gradient(to right, transparent, rgba(0, 255, 204, 0.4), rgba(0, 255, 204, 0.8), rgba(0, 255, 204, 0.4), transparent);
            height: 2px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.8);
        }
        
        /* Synchronized Heartbeat Keyframes */
        @keyframes heart-flash {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px transparent); }
            15% { transform: scale(1.25); filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.95)); }
            30% { transform: scale(0.9); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }
        .heart-beat-active {
            animation-name: heart-flash;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            transform-origin: center;
            display: inline-block;
        }
        
        /* Synchronized Vitals Card Flash Keyframes */
        @keyframes card-flash-red {
            0%, 100% { border-color: rgba(255, 255, 255, 0.05); box-shadow: none; }
            15% { border-color: rgba(239, 68, 68, 0.45); box-shadow: 0 0 20px rgba(239, 68, 68, 0.22); }
        }
        @keyframes card-flash-cyan {
            0%, 100% { border-color: rgba(255, 255, 255, 0.05); box-shadow: none; }
            15% { border-color: rgba(0, 255, 204, 0.45); box-shadow: 0 0 20px rgba(0, 255, 204, 0.22); }
        }
        @keyframes card-flash-amber {
            0%, 100% { border-color: rgba(255, 255, 255, 0.05); box-shadow: none; }
            15% { border-color: rgba(245, 158, 11, 0.45); box-shadow: 0 0 20px rgba(245, 158, 11, 0.22); }
        }
        .card-flash-active {
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }
        /* Override Tailwind bg-[#090D1A]/30 classes for glassmorphic panels */
        div[class*="bg-[#090D1A]/30"] {
            background-color: transparent !important;
            box-shadow: none !important;
        }

</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-[#00FFCC] selection:text-black">

    <!-- React Mounting Target -->
    <div id="root" class="relative z-10"></div>

    <!-- React Script Block -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Framer Motion UMD Global Helper with resilient fallbacks
        const Motion = (window.Motion || window.framerMotion || {}).motion || {
            div: 'div',
            span: 'span',
            button: 'button',
            h1: 'h1',
            h2: 'h2',
            h3: 'h3',
            p: 'p',
            header: 'header',
            nav: 'nav',
            section: 'section',
            g: 'g',
            svg: 'svg'
        };

        // Custom Component: Cinematic YouTube Background Video Engine
        const YoutubeBackgroundEngine = () => {
            return (
                <div className="fixed inset-0 w-full h-full overflow-hidden pointer-events-none z-0 bg-black">
                    {/* The YouTube embed iframe configured exactly to hide UI and autoplay loop muted */}
                    <iframe 
                        className="w-[100vw] h-[56.25vw] min-h-[100vh] min-w-[177.77vh] absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 object-cover filter brightness-[0.45] pointer-events-none z-0"
                        src="https://www.youtube.com/embed/6BlfNIfGFfM?autoplay=1&mute=1&loop=1&playlist=6BlfNIfGFfM&controls=0&showinfo=0&rel=0&modestbranding=1&playsinline=1&enablejsapi=1&start=2"
                        frameBorder="0" 
                        allow="autoplay; encrypted-media" 
                        allowFullScreen
                    />
                </div>
            );
        };

        // Custom Component: Physics-based Lerping HUD Reticle Cursor with Click Compression & Spin Easing
        const CustomCursor = () => {
            const [isVisible, setIsVisible] = useState(false);
            const cursorRef = useRef({
                targetX: -100,
                targetY: -100,
                currentX: -100,
                currentY: -100,
                scale: 1,
                targetScale: 1,
                rotation: 0
            });

            const outerRingRef = useRef(null);
            const innerDotRef = useRef(null);
            const [hovering, setHovering] = useState(false);

            useEffect(() => {
                const hasMouse = window.matchMedia('(pointer: fine)').matches;
                if (!hasMouse) return;

                setIsVisible(true);
                document.body.style.cursor = 'none';

                const handleMouseMove = (e) => {
                    const c = cursorRef.current;
                    const dx = e.clientX - c.targetX;
                    const dy = e.clientY - c.targetY;
                    const speed = Math.sqrt(dx * dx + dy * dy);
                    
                    c.targetX = e.clientX;
                    c.targetY = e.clientY;
                    
                    // Velocity based scale expansion
                    c.targetScale = 1.0 + Math.min(speed * 0.02, 0.95);
                };

                const handleMouseOver = (e) => {
                    const target = e.target;
                    const isClickable = target.closest('button') || target.closest('a') || target.closest('[role="button"]') || target.closest('.cursor-pointer') || window.getComputedStyle(target).cursor === 'pointer';
                    setHovering(!!isClickable);
                };

                const handleMouseDown = () => {
                    cursorRef.current.scale = 0.15;
                };

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseover', handleMouseOver);
                window.addEventListener('mousedown', handleMouseDown);

                let animationFrameId;

                const updatePhysics = () => {
                    const c = cursorRef.current;
                    
                    // 0.12 lerp trailing factor
                    c.currentX += (c.targetX - c.currentX) * 0.12;
                    c.currentY += (c.targetY - c.currentY) * 0.12;
                    
                    if (hovering) {
                        c.rotation = (c.rotation + 7.5) % 360;
                    } else {
                        c.rotation = 0;
                    }
                    
                    const baseScale = hovering ? 1.65 : 1.0;
                    c.scale += ((c.targetScale * baseScale) - c.scale) * 0.15;
                    
                    c.targetScale += (1.0 - c.targetScale) * 0.08;

                    if (outerRingRef.current) {
                        outerRingRef.current.style.left = c.currentX + 'px';
                        outerRingRef.current.style.top = c.currentY + 'px';
                        outerRingRef.current.style.transform = 'translate(-50%, -50%) scale(' + c.scale + ') rotate(' + c.rotation + 'deg)';
                        
                        if (hovering) {
                            outerRingRef.current.style.borderColor = 'rgba(0, 255, 204, 0.95)';
                            outerRingRef.current.style.backgroundColor = 'rgba(0, 255, 204, 0.08)';
                            outerRingRef.current.style.boxShadow = '0 0 25px rgba(0, 255, 204, 0.6)';
                        } else {
                            outerRingRef.current.style.borderColor = 'rgba(0, 255, 204, 0.8)';
                            outerRingRef.current.style.backgroundColor = 'transparent';
                            outerRingRef.current.style.boxShadow = 'none';
                        }
                    }

                    if (innerDotRef.current) {
                        innerDotRef.current.style.left = c.targetX + 'px';
                        innerDotRef.current.style.top = c.targetY + 'px';
                    }

                    animationFrameId = requestAnimationFrame(updatePhysics);
                };

                updatePhysics();

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseover', handleMouseOver);
                    window.removeEventListener('mousedown', handleMouseDown);
                    document.body.style.cursor = 'default';
                    cancelAnimationFrame(animationFrameId);
                };
            }, [hovering]);

            if (!isVisible) return null;

            const initialOuterStyle = {
                width: '24px',
                height: '24px',
                left: '-100px',
                top: '-100px',
                transform: 'translate(-50%, -50%) scale(1)'
            };

            const initialInnerStyle = {
                left: '-100px',
                top: '-100px'
            };

            return (
                <React.Fragment>
                    <div 
                        ref={outerRingRef}
                        className="fixed pointer-events-none z-50 rounded-full border border-dashed border-[#00FFCC]"
                        style={initialOuterStyle}
                    />
                    <div 
                        ref={innerDotRef}
                        className="fixed pointer-events-none z-50 h-1.5 w-1.5 rounded-full bg-[#00FFCC] -translate-x-1/2 -translate-y-1/2"
                        style={initialInnerStyle}
                    />
                </React.Fragment>
            );
        };

        // ScrollReveal Viewport Slide-In Animation Component using Framer Motion if available
        const ScrollReveal = ({ children }) => {
            const isMotionAvailable = !!(window.Motion || window.framerMotion);
            if (isMotionAvailable) {
                return (
                    <Motion.div
                        initial={{ opacity: 0, y: 40 }}
                        whileInView={{ opacity: 1, y: 0 }}
                        viewport={{ once: true, margin: "-100px" }}
                        transition={{ duration: 0.8, ease: [0.16, 1, 0.3, 1] }}
                    >
                        {children}
                    </Motion.div>
                );
            }

            const elementRef = useRef(null);
            const [revealed, setRevealed] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setRevealed(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    {
                        threshold: 0.08,
                        rootMargin: '0px 0px -50px 0px'
                    }
                );

                if (elementRef.current) {
                    observer.observe(elementRef.current);
                }

                return () => observer.disconnect();
            }, []);

            return (
                <div 
                    ref={elementRef}
                    className={'transition-all duration-1000 cubic-bezier(0.175, 0.885, 0.32, 1.275) ' + (revealed ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12')}
                >
                    {children}
                </div>
            );
        };

        // Custom Component: Motion Card supporting dynamic scale/box-shadow transitions using Framer Motion
        // Smoked Curved Glass Recipe
        const MotionCard = ({ children, className = "", borderType = "cyan", variants, ...props }) => {
            const shadowColor = borderType === "emerald" ? "rgba(16, 185, 129, 0.1)" : (borderType === "red" ? "rgba(239, 68, 68, 0.1)" : "rgba(0, 255, 204, 0.12)");
            const glassRecipe = "backdrop-blur-xl bg-slate-950/30 border border-white/5 shadow-2xl rounded-[2rem]";
            
            const isMotionAvailable = !!(window.Motion || window.framerMotion);
            if (isMotionAvailable) {
                return (
                    <Motion.div
                        className={`${className} ${glassRecipe} transition-[border-color] duration-500`}
                        variants={variants}
                        whileHover={{ 
                            y: -8, 
                            scale: 1.015, 
                            borderColor: "rgba(0, 255, 204, 0.3)",
                            boxShadow: `0 20px 40px ${shadowColor}`
                        }}
                        transition={{ ease: [0.16, 1, 0.3, 1], duration: 0.4 }}
                        {...props}
                    >
                        {children}
                    </Motion.div>
                );
            }

            const [isHovered, setIsHovered] = useState(false);
            const cardStyle = {
                transform: isHovered ? 'translateY(-8px) scale(1.015)' : 'translateY(0) scale(1.0)',
                boxShadow: isHovered ? `0 20px 40px ${shadowColor}` : 'none',
                borderColor: isHovered ? "rgba(0, 255, 204, 0.3)" : "rgba(255, 255, 255, 0.05)",
                transition: 'all 400ms cubic-bezier(0.16, 1, 0.3, 1)'
            };

            return (
                <div 
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                    className={`${className} ${glassRecipe}`}
                    style={cardStyle}
                    {...props}
                >
                    {children}
                </div>
            );
        };

        // Custom Component: Highly Sophisticated Minimalist Sci-Fi Biometric Human Profile
        const FaceMeshVisualizer = ({ driverState, bac }) => {
            const [time, setTime] = useState(0);
            const requestRef = useRef();

            useEffect(() => {
                const animate = () => {
                    setTime(prev => prev + 1);
                    requestRef.current = requestAnimationFrame(animate);
                };
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, []);

            let headX = 0;
            let headY = 0;
            let headAngle = 0;
            let irisColor = "#00FFCC"; 
            let bgColor = "from-cyan-950/20 via-slate-950/40 to-slate-950";
            let bgGlow = "rgba(0, 255, 204, 0.15)";
            
            let saccadeX = Math.sin(time * 0.08) * 1.5;
            let saccadeY = Math.cos(time * 0.05) * 0.8;

            let upperEyelidScale = 1.0;
            let lowerEyelidScale = 1.0;
            let showApertureWarning = false;
            let displayEar = 0.32;
            let blinkRate = "12/m";

            if (driverState === "Drowsy") {
                headX = 0;
                headY = 16 + Math.sin(time * 0.04) * 3;
                headAngle = 1 + Math.sin(time * 0.04) * 2;
                upperEyelidScale = 0.4; 
                lowerEyelidScale = 0.8;
                showApertureWarning = true;
                displayEar = 0.12;
                blinkRate = "28/m";
                irisColor = "#f59e0b"; 
                bgColor = "from-amber-950/20 via-slate-950/40 to-slate-950";
                bgGlow = "rgba(245, 158, 11, 0.15)";
                saccadeX = 0;
                saccadeY = 0;
            } else if (driverState === "Medical Emergency") {
                headX = -18;
                headY = 22;
                headAngle = -25; 
                upperEyelidScale = 0.0; 
                lowerEyelidScale = 0.0;
                displayEar = 0.00;
                blinkRate = "0/m";
                irisColor = "#ef4444"; 
                bgColor = "from-red-950/20 via-slate-950/40 to-slate-950";
                bgGlow = "rgba(239, 68, 68, 0.1)";
                saccadeX = 0;
                saccadeY = 0;
            } else if (bac >= 0.08) {
                headX = Math.sin(time * 0.035) * 8;
                headY = Math.cos(time * 0.02) * 2;
                headAngle = Math.sin(time * 0.025) * 4;
                upperEyelidScale = 0.65;
                lowerEyelidScale = 0.65;
                displayEar = 0.21;
                blinkRate = "18/m";
                irisColor = "#eab308"; 
                bgColor = "from-indigo-950/20 via-slate-950/40 to-slate-950";
                bgGlow = "rgba(234, 179, 8, 0.15)";
                saccadeX = Math.sin(time * 0.12) * 3.5; 
                saccadeY = Math.cos(time * 0.09) * 2.0;
            }

            const headCenter = { x: 100, y: 95 };
            const transformStr = 'translate(' + headX + ', ' + headY + ') rotate(' + headAngle + ', ' + headCenter.x + ', ' + headCenter.y + ')';
            const svgStyle = { filter: 'drop-shadow(0 0 10px ' + irisColor + '40)' };
            const glowStyle = { background: 'radial-gradient(circle, ' + bgGlow + ' 0%, transparent 70%)' };

            return (
                <div className="w-full h-full relative flex items-center justify-center bg-[#030508] p-4 rounded-[1.5rem] overflow-hidden border border-slate-900 transition-all duration-700">
                    <div className="absolute inset-0 bg-gradient-to-b opacity-50 pointer-events-none" style={glowStyle}></div>
                    <div className="absolute inset-0 hud-grid opacity-25 pointer-events-none"></div>

                    <svg viewBox="0 0 200 200" className="w-full h-full relative z-10 transition-all duration-700 ease-out" style={svgStyle}>
                        <g transform={transformStr} className="transition-transform duration-700 ease-out">
                            
                            {/* Neck */}
                            <path 
                                d="M 82,125 L 82,165 C 82,168 85,172 90,172 L 110,172 C 115,172 118,168 118,165 L 118,125 Z" 
                                fill="none" 
                                stroke="rgba(255,255,255,0.2)" 
                                strokeWidth="1.5" 
                            />
                            
                            {/* Head Outline */}
                            <path 
                                d="M 58,75 C 58,45 142,45 142,75 C 142,105 138,122 126,136 C 118,145 110,149 100,149 C 90,149 82,145 74,136 C 62,122 58,105 58,75 Z" 
                                fill="none" 
                                stroke="rgba(255,255,255,0.2)" 
                                strokeWidth="1.5" 
                            />

                            {/* Facemesh Coordinates */}
                            <g stroke="rgba(255,255,255,0.08)" strokeWidth="0.75" strokeDasharray="2,2" fill="none">
                                <line x1="100" y1="50" x2="62" y2="75" />
                                <line x1="100" y1="50" x2="138" y2="75" />
                                <line x1="62" y1="75" x2="78" y2="115" />
                                <line x1="138" y1="75" x2="122" y2="115" />
                                <line x1="100" y1="50" x2="100" y2="95" />
                                <line x1="100" y1="95" x2="78" y2="115" />
                                <line x1="100" y1="95" x2="122" y2="115" />
                                <line x1="78" y1="115" x2="100" y2="149" />
                                <line x1="122" y1="115" x2="100" y2="149" />
                                <line x1="78" y1="115" x2="74" y2="136" />
                                <line x1="122" y1="115" x2="126" y2="136" />
                                <line x1="74" y1="136" x2="100" y2="149" />
                                <line x1="126" y1="136" x2="100" y2="149" />
                            </g>

                            {/* Tracker Nodes */}
                            <g fill={irisColor} stroke="#ffffff" strokeWidth="0.5">
                                <circle cx="100" cy="50" r="2.5" />
                                <circle cx="62" cy="75" r="2.5" />
                                <circle cx="138" cy="75" r="2.5" />
                                <circle cx="78" cy="115" r="2.5" />
                                <circle cx="122" cy="115" r="2.5" />
                                <circle cx="74" cy="136" r="2.5" />
                                <circle cx="126" cy="136" r="2.5" />
                                <circle cx="100" cy="149" r="2.5" />
                                <circle cx="100" cy="95" r="2.5" />
                            </g>

                            {/* Left Eye */}
                            <g transform="translate(76, 90)">
                                <path d={'M -15,0 Q 0,' + (-8 * upperEyelidScale) + ' 15,0'} stroke={irisColor} strokeWidth="1.5" fill="none" strokeLinecap="round" />
                                <path d={'M -15,0 Q 0,' + (8 * lowerEyelidScale) + ' 15,0'} stroke={irisColor} strokeWidth="1.5" fill="none" strokeLinecap="round" />
                                
                                {upperEyelidScale > 0.0 && (
                                    <g>
                                        <circle cx={saccadeX} cy={saccadeY} r="4.5" fill="none" stroke="#00FFCC" strokeWidth="1" />
                                        <circle cx={saccadeX} cy={saccadeY} r="1.5" fill="#00FFCC" />
                                        <line x1={saccadeX - 6} y1={saccadeY} x2={saccadeX + 6} y2={saccadeY} stroke="#00FFCC" strokeWidth="0.5" opacity="0.6" />
                                        <line x1={saccadeX} y1={saccadeY - 6} x2={saccadeX} y2={saccadeY + 6} stroke="#00FFCC" strokeWidth="0.5" opacity="0.6" />
                                    </g>
                                )}
                            </g>

                            {/* Right Eye */}
                            <g transform="translate(124, 90)">
                                <path d={'M -15,0 Q 0,' + (-8 * upperEyelidScale) + ' 15,0'} stroke={irisColor} strokeWidth="1.5" fill="none" strokeLinecap="round" />
                                <path d={'M -15,0 Q 0,' + (8 * lowerEyelidScale) + ' 15,0'} stroke={irisColor} strokeWidth="1.5" fill="none" strokeLinecap="round" />
                                
                                {upperEyelidScale > 0.0 && (
                                    <g>
                                        <circle cx={saccadeX} cy={saccadeY} r="4.5" fill="none" stroke="#00FFCC" strokeWidth="1" />
                                        <circle cx={saccadeX} cy={saccadeY} r="1.5" fill="#00FFCC" />
                                        <line x1={saccadeX - 6} y1={saccadeY} x2={saccadeX + 6} y2={saccadeY} stroke="#00FFCC" strokeWidth="0.5" opacity="0.6" />
                                        <line x1={saccadeX} y1={saccadeY - 6} x2={saccadeX} y2={saccadeY + 6} stroke="#00FFCC" strokeWidth="0.5" opacity="0.6" />
                                    </g>
                                )}
                            </g>

                            {/* Coordinates metrics */}

        // Custom Component: Rolling Speedometer Telemetry Counter
        const AnimatedCounter = ({ value, duration = 350 }) => {
            const [displayValue, setDisplayValue] = useState(value);
            
            useEffect(() => {
                let startTimestamp = null;
                const startVal = parseFloat(displayValue);
                const endVal = parseFloat(value);
                if (isNaN(endVal) || isNaN(startVal)) {
                    setDisplayValue(value);
                    return;
                }
                
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    const current = startVal + progress * (endVal - startVal);
                    
                    if (Number.isInteger(endVal)) {
                        setDisplayValue(Math.floor(current));
                    } else {
                        setDisplayValue(current.toFixed(3));
                    }
                    
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            }, [value]);

            return <span className="font-mono tracking-wider">{displayValue}</span>;

        // Custom Component: Responsive Canvas-based ECG waves bound to simulator state
        const EcgVisualizer = ({ bpm, driverState, bac }) => {
            const canvasRef = useRef(null);
            const stateStartTimeRef = useRef(Date.now());
            const prevStateRef = useRef(driverState);
            
            useEffect(() => {
                if (prevStateRef.current !== driverState) {
                    stateStartTimeRef.current = Date.now();
                    prevStateRef.current = driverState;
                }
            }, [driverState]);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                let animationId;
                let offset = 0;
                
                const render = () => {
                    if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
                        canvas.width = canvas.clientWidth;
                        canvas.height = canvas.clientHeight;
                    }
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    let color = '#00FFCC'; // Active - Hyper-Car Mint Green
                    if (driverState === "Drowsy") {
                        color = '#f59e0b'; // Fatigue - Amber
                    } else if (driverState === "Medical Emergency") {
                        color = '#ef4444'; // Medical - Red
                    } else if (bac >= 0.08) {
                        color = '#6366f1'; // Alcohol - Indigo
                    }
                    
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2.5;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                    
                    ctx.beginPath();
                    const midY = canvas.height / 2;
                    const w = canvas.width;
                    
                    const cycleWidth = Math.max(100, (60 / bpm) * 320);
                    
                    for (let x = 0; x < w; x++) {
                        let cycleX = (x + offset) % cycleWidth;
                        let y = midY;
                        
                        if (driverState === "Medical Emergency") {
                            const timeElapsed = Date.now() - stateStartTimeRef.current;
                            if (timeElapsed < 6000) {
                                y = midY + Math.sin(cycleX * 0.16) * 38 + Math.sin(cycleX * 0.35) * 12;
                            } else {
                                y = midY + (Math.sin(x * 0.05) * 0.8);
                            }
                        } else if (bac >= 0.08) {
                            if (cycleX > 15 && cycleX < 30) {
                                let p = (cycleX - 15) / 15;
                                y = midY - Math.sin(p * Math.PI) * 7;
                            } else if (cycleX >= 34 && cycleX < 38) {
                                let q = (cycleX - 34) / 4;
                                y = midY + (q * 10);
                            } else if (cycleX >= 38 && cycleX < 44) {
                                let r = (cycleX - 38) / 6;
                                y = (midY + 10) - (Math.sin(r * Math.PI) * 65);
                            } else if (cycleX >= 44 && cycleX < 49) {
                                let s = (cycleX - 44) / 5;
                                y = midY + (Math.sin(s * Math.PI) * 22);
                            } else if (cycleX >= 58 && cycleX < 78) {
                                let t = (cycleX - 58) / 20;
                                y = midY - Math.sin(t * Math.PI) * 12;
                            }
                            if (cycleX > 100 && cycleX < 105) {
                                y += (Math.random() - 0.5) * 6;
                            }
                        } else {
                            if (cycleX > 15 && cycleX < 30) {
                                let p = (cycleX - 15) / 15;
                                y = midY - Math.sin(p * Math.PI) * 7;
                            } else if (cycleX >= 34 && cycleX < 38) {
                                let q = (cycleX - 34) / 4;
                                y = midY + (q * 10);
                            } else if (cycleX >= 38 && cycleX < 44) {
                                let r = (cycleX - 38) / 6;
                                y = (midY + 10) - (Math.sin(r * Math.PI) * 65);
                            } else if (cycleX >= 44 && cycleX < 49) {
                                let s = (cycleX - 44) / 5;
                                y = midY + (Math.sin(s * Math.PI) * 22);
                            } else if (cycleX >= 58 && cycleX < 78) {
                                let t = (cycleX - 58) / 20;
                                y = midY - Math.sin(t * Math.PI) * 12;
                            }
                        }
                        
                        if (x === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    
                    ctx.stroke();
                    
                    offset += Math.max(1.8, bpm / 22);
                    animationId = window.requestAnimationFrame(render);
                };

                    const ctx = audioCtxRef.current;
                    const now = ctx.currentTime;
                    
                    const triggerBeep = (time, freq, dur) => {
                        const osc1 = ctx.createOscillator();
                        const osc2 = ctx.createOscillator();
                        const gainNode = ctx.createGain();
                        
                        osc1.type = 'sine';
                        osc1.frequency.setValueAtTime(freq, time);
                        
                        osc2.type = 'triangle';
                        osc2.frequency.setValueAtTime(freq / 2, time);
                        
                        gainNode.gain.setValueAtTime(0, time);
                        gainNode.gain.linearRampToValueAtTime(0.08, time + 0.02);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, time + dur);
                        
                        osc1.connect(gainNode);
                        osc2.connect(gainNode);
                        gainNode.connect(ctx.destination);
                        
                        osc1.start(time);
                        osc1.stop(time + dur);

                                    <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor" className="fill-transparent" />
                                    <line x1="22" y1="2" x2="2" y2="22" className="opacity-80" />
                                </React.Fragment>
                            )}
                        </svg>
                    </button>
                </div>
            );
        };

        // Render React DOM App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Self-initializing DOM Event Listener audio toggle framework (dual-environment)
        const initAudio = () => {
            const audioBtn = document.getElementById('audio-toggle-btn');
            let audioTrack = null;
            let isPlayingStatus = false;

            const bindEvent = (btn) => {
                if (!btn || btn.dataset.bound) return;
                btn.dataset.bound = "true";
                btn.addEventListener('click', () => {
                    if (!audioTrack) {
                        // Detects current execution domain context
                        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

                        // Maps cleanly to the public asset folder layout natively across both systems
                        const audioSourcePath = isLocalhost ? '/public/interstellar.mp3' : '/public/interstellar.mp3';

                        audioTrack = new Audio(audioSourcePath);
                        audioTrack.loop = true;
                    }

                    if (isPlayingStatus) {
                        audioTrack.pause();
                        isPlayingStatus = false;
                        btn.style.borderColor = "rgba(255, 255, 255, 0.1)";
                        btn.style.boxShadow = "none";
                        if (window.setIsAudioPlaying) window.setIsAudioPlaying(false);
                    } else {
                        audioTrack.play()
                            .then(() => {
                                isPlayingStatus = true;
                                btn.style.borderColor = "#00F0FF";
                                btn.style.boxShadow = "0 0 15px rgba(0, 240, 255, 0.4)";
                                if (window.setIsAudioPlaying) window.setIsAudioPlaying(true);
                            })
                            .catch((error) => {
                                console.error("Audio trigger intercepted by browser security settings:", error);
                            });
                    }
                });
            };

            if (audioBtn) {
                bindEvent(audioBtn);
            }

            const observer = new MutationObserver(() => {
                const btn = document.getElementById('audio-toggle-btn');
                if (btn) bindEvent(btn);
            });
            observer.observe(document.body, { childList: true, subtree: true });
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAudio);
        } else {
            initAudio();
        }
    </script>
</body>
