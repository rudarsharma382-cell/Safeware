<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEWARE — AI-Powered Responsive Road Safety System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            obsidian: '#05070C',
                            slate: '#0B0F19',
                            cyan: '#06b6d4',
                            emerald: '#10b981',
                            amber: '#f59e0b',
                            red: '#ef4444',
                            steel: '#1e293b',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        display: ['Syncopate', 'Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scanline-sweep': 'scanlineSweep 4s ease-in-out infinite',
                        'vignette-red': 'vignetteRed 1s ease-in-out infinite alternate',
                        'vignette-amber': 'vignetteAmber 1.5s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        scanlineSweep: {
                            '0%': { top: '0%' },
                            '50%': { top: '100%' },
                            '100%': { top: '0%' },
                        },
                        vignetteRed: {
                            '0%': { 'box-shadow': 'inset 0 0 35px rgba(239, 68, 68, 0.35)' },
                            '100%': { 'box-shadow': 'inset 0 0 85px rgba(239, 68, 68, 0.85)' }
                        },
                        vignetteAmber: {
                            '0%': { 'box-shadow': 'inset 0 0 25px rgba(245, 158, 11, 0.25)' },
                            '100%': { 'box-shadow': 'inset 0 0 60px rgba(245, 158, 11, 0.65)' }
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts (Preloaded Syncopate wide font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel standalone JSX compiler -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(ellipse at top, #0f172a, #080711, #020205);
            color: #f3f4f6;
            overflow-x: hidden;
        }
        .hud-grid {
            background-image: linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Custom Fluid Scrollbars */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #06b6d4, #6366f1);
            border-radius: 9999px;
        }
        .data-flow-line {
            stroke-dasharray: 8, 6;
            animation: flow 1.2s linear infinite;
        }
        @keyframes flow {
            to { stroke-dashoffset: -20; }
        }
        .laser-line {
            background: linear-gradient(to right, transparent, rgba(6, 182, 212, 0.4), rgba(6, 182, 212, 0.7), rgba(6, 182, 212, 0.4), transparent);
            height: 2px;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.8);
        }
        .spring-transition {
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Synchronized Heartbeat Keyframes */
        @keyframes heart-flash {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px transparent); }
            15% { transform: scale(1.25); filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.95)); }
            30% { transform: scale(0.9); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }
        .heart-beat-active {
            animation-name: heart-flash;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            transform-origin: center;
            display: inline-block;
        }
        
        /* Synchronized Vitals Card Flash Keyframes */
        @keyframes card-flash-red {
            0%, 100% { border-color: rgba(255, 255, 255, 0.05); box-shadow: none; }
            15% { border-color: rgba(239, 68, 68, 0.45); box-shadow: 0 0 20px rgba(239, 68, 68, 0.22); }
        }
        @keyframes card-flash-cyan {
            0%, 100% { border-color: rgba(255, 255, 255, 0.05); box-shadow: none; }
            15% { border-color: rgba(6, 182, 212, 0.45); box-shadow: 0 0 20px rgba(6, 182, 212, 0.22); }
        }
        @keyframes card-flash-amber {
            0%, 100% { border-color: rgba(255, 255, 255, 0.05); box-shadow: none; }
            15% { border-color: rgba(245, 158, 11, 0.45); box-shadow: 0 0 20px rgba(245, 158, 11, 0.22); }
        }
        .card-flash-active {
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-cyan-500 selection:text-black">

    <!-- React Mounting Target -->
    <div id="root"></div>

    <!-- React Script Block -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Component: Physics-based Lerping HUD Reticle Cursor with Click Compression
        const CustomCursor = () => {
            const [isVisible, setIsVisible] = useState(false);
            const cursorRef = useRef({
                targetX: -100,
                targetY: -100,
                currentX: -100,
                currentY: -100,
                scale: 1,
                targetScale: 1
            });

            const outerRingRef = useRef(null);
            const innerDotRef = useRef(null);
            const [hovering, setHovering] = useState(false);

            useEffect(() => {
                const hasMouse = window.matchMedia('(pointer: fine)').matches;
                if (!hasMouse) return;

                setIsVisible(true);
                document.body.style.cursor = 'none';

                const handleMouseMove = (e) => {
                    const c = cursorRef.current;
                    const dx = e.clientX - c.targetX;
                    const dy = e.clientY - c.targetY;
                    const speed = Math.sqrt(dx * dx + dy * dy);
                    
                    c.targetX = e.clientX;
                    c.targetY = e.clientY;
                    
                    // Velocity based target scale expansion
                    c.targetScale = 1.0 + Math.min(speed * 0.02, 0.95);
                };

                const handleMouseOver = (e) => {
                    const target = e.target;
                    const isClickable = target.closest('button') || target.closest('a') || window.getComputedStyle(target).cursor === 'pointer';
                    setHovering(!!isClickable);
                };

                const handleMouseDown = () => {
                    // Force compression on click
                    cursorRef.current.scale = 0.15;
                };

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseover', handleMouseOver);
                window.addEventListener('mousedown', handleMouseDown);

                let animationFrameId;

                const updatePhysics = () => {
                    const c = cursorRef.current;
                    
                    // Easing lerp equations (0.10 factor)
                    c.currentX += (c.targetX - c.currentX) * 0.10;
                    c.currentY += (c.targetY - c.currentY) * 0.10;
                    
                    const baseScale = hovering ? 1.55 : 1.0;
                    c.scale += ((c.targetScale * baseScale) - c.scale) * 0.15;
                    
                    // Decay velocity scale back to normal
                    c.targetScale += (1.0 - c.targetScale) * 0.08;

                    if (outerRingRef.current) {
                        outerRingRef.current.style.left = c.currentX + 'px';
                        outerRingRef.current.style.top = c.currentY + 'px';
                        outerRingRef.current.style.transform = 'translate(-50%, -50%) scale(' + c.scale + ')';
                        
                        if (hovering) {
                            outerRingRef.current.style.borderColor = 'rgba(6, 182, 212, 0.95)';
                            outerRingRef.current.style.backgroundColor = 'rgba(6, 182, 212, 0.06)';
                            outerRingRef.current.style.boxShadow = '0 0 16px rgba(6, 182, 212, 0.45)';
                        } else {
                            outerRingRef.current.style.borderColor = 'rgba(6, 182, 212, 0.8)';
                            outerRingRef.current.style.backgroundColor = 'transparent';
                            outerRingRef.current.style.boxShadow = 'none';
                        }
                    }

                    if (innerDotRef.current) {
                        innerDotRef.current.style.left = c.targetX + 'px';
                        innerDotRef.current.style.top = c.targetY + 'px';
                    }

                    animationFrameId = requestAnimationFrame(updatePhysics);
                };

                updatePhysics();

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseover', handleMouseOver);
                    window.removeEventListener('mousedown', handleMouseDown);
                    document.body.style.cursor = 'default';
                    cancelAnimationFrame(animationFrameId);
                };
            }, [hovering]);

            if (!isVisible) return null;

            const initialOuterStyle = {
                width: '24px',
                height: '24px',
                left: '-100px',
                top: '-100px',
                transform: 'translate(-50%, -50%) scale(1)'
            };

            const initialInnerStyle = {
                left: '-100px',
                top: '-100px'
            };

            return (
                <React.Fragment>
                    <div 
                        ref={outerRingRef}
                        className="fixed pointer-events-none z-50 rounded-full border border-cyan-400/80"
                        style={initialOuterStyle}
                    />
                    <div 
                        ref={innerDotRef}
                        className="fixed pointer-events-none z-50 h-1.5 w-1.5 rounded-full bg-cyan-400 -translate-x-1/2 -translate-y-1/2"
                        style={initialInnerStyle}
                    />
                </React.Fragment>
            );
        };

        // ScrollReveal Viewport Slide-In Animation Component
        const ScrollReveal = ({ children }) => {
            const elementRef = useRef(null);
            const [revealed, setRevealed] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setRevealed(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    {
                        threshold: 0.08,
                        rootMargin: '0px 0px -50px 0px'
                    }
                );

                if (elementRef.current) {
                    observer.observe(elementRef.current);
                }

                return () => observer.disconnect();
            }, []);

            return (
                <div 
                    ref={elementRef}
                    className={'transition-all duration-1000 cubic-bezier(0.175, 0.885, 0.32, 1.275) ' + (revealed ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12')}
                >
                    {children}
                </div>
            );
        };

        // Custom Component: High-Fidelity SVG Face Mesh Avatar Visualizer
        const FaceMeshVisualizer = ({ driverState, bac }) => {
            const [time, setTime] = useState(0);
            const requestRef = useRef();

            useEffect(() => {
                const animate = () => {
                    setTime(prev => prev + 1);
                    requestRef.current = requestAnimationFrame(animate);
                };
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, []);

            // Dynamic head parameters bound to Tactical states
            let headX = 0;
            let headY = 0;
            let headAngle = 0;
            let eyeHeight = 8; 
            let mouthHeight = 4; 
            let mouthWidth = 24;
            let meshColor = "rgba(6, 182, 212, 0.4)";
            let nodeColor = "#06b6d4";
            let pupilOffset = Math.sin(time * 0.03) * 3;

            if (driverState === "Drowsy") {
                headX = 0;
                headY = 14; 
                headAngle = 2;
                eyeHeight = 1.0; 
                mouthHeight = 22; 
                mouthWidth = 18;
                meshColor = "rgba(245, 158, 11, 0.45)";
                nodeColor = "#f59e0b";
                pupilOffset = 0;
            } else if (driverState === "Medical Emergency") {
                headX = -20;
                headY = 20; 
                headAngle = -18;
                eyeHeight = 0.2; 
                mouthHeight = 10; 
                mouthWidth = 14;
                const pulse = 0.15 + Math.sin(time * 0.08) * 0.1;
                meshColor = 'rgba(239, 68, 68, ' + pulse + ')';
                nodeColor = "#ef4444";
                pupilOffset = 0;
            } else if (bac >= 0.08) {
                headX = Math.sin(time * 0.05) * 6;
                headY = Math.cos(time * 0.03) * 2;
                headAngle = Math.sin(time * 0.04) * 4;
                eyeHeight = 4.5; 
                mouthHeight = 4;
                mouthWidth = 24;
                meshColor = "rgba(234, 179, 8, 0.4)";
                nodeColor = "#eab308";
                pupilOffset = Math.sin(time * 0.09) * 4.5; 
            }

            const headCenter = { x: 100, y: 95 };
            const transformStr = 'translate(' + headX + ', ' + headY + ') rotate(' + headAngle + ', ' + headCenter.x + ', ' + headCenter.y + ')';

            return (
                <div className="w-full h-full relative flex items-center justify-center bg-[#030508] p-4 rounded-[1.5rem] overflow-hidden border border-slate-900">
                    <div className="absolute inset-0 hud-grid opacity-30 pointer-events-none"></div>

                    <svg 
                        viewBox="0 0 200 200" 
                        className="w-full h-full relative z-10 transition-all duration-700 ease-out"
                        style={{ filter: 'drop-shadow(0 0 10px ' + nodeColor + '40)' }}
                    >
                        <g transform={transformStr} className="transition-transform duration-700 ease-out">
                            {/* Head Outline Contour */}
                            <path 
                                d="M 60,60 C 60,35 140,35 140,60 C 140,90 145,115 135,135 C 125,155 115,165 100,165 C 85,165 75,155 65,135 C 55,115 60,90 60,60 Z" 
                                fill="none" 
                                stroke={meshColor} 
                                strokeWidth="1.5" 
                                strokeDasharray="4 2"
                            />
                            
                            {/* Neck base */}
                            <path 
                                d="M 85,160 L 75,185 M 115,160 L 125,185" 
                                stroke={meshColor} 
                                strokeWidth="1.5"
                            />

                            {/* Left Eye */}
                            <ellipse 
                                cx="80" 
                                cy="85" 
                                rx="12" 
                                ry={eyeHeight} 
                                fill="none" 
                                stroke={nodeColor} 
                                strokeWidth="2" 
                            />
                            {eyeHeight > 1.8 && (
                                <circle cx={80 + pupilOffset} cy="85" r="4.5" fill={nodeColor} opacity="0.8" />
                            )}

                            {/* Right Eye */}
                            <ellipse 
                                cx="120" 
                                cy="85" 
                                rx="12" 
                                ry={eyeHeight} 
                                fill="none" 
                                stroke={nodeColor} 
                                strokeWidth="2" 
                            />
                            {eyeHeight > 1.8 && (
                                <circle cx={120 + pupilOffset} cy="85" r="4.5" fill={nodeColor} opacity="0.8" />
                            )}

                            {/* Eyebrows */}
                            <path d="M 68,75 Q 80,70 90,77" stroke={meshColor} strokeWidth="1.5" fill="none" />
                            <path d="M 132,75 Q 120,70 110,77" stroke={meshColor} strokeWidth="1.5" fill="none" />

                            {/* Nose bridge & tip */}
                            <path d="M 100,75 L 100,115 L 94,122 L 106,122 Z" stroke={meshColor} strokeWidth="1.5" fill="none" />

                            {/* Mouth */}
                            <ellipse 
                                cx="100" 
                                cy="140" 
                                rx={mouthWidth} 
                                ry={mouthHeight} 
                                fill="none" 
                                stroke={nodeColor} 
                                strokeWidth="2" 
                            />

                            {/* Biometric Landmark Mesh Lines */}
                            <g opacity="0.35">
                                <line x1="100" y1="40" x2="80" y2="52" stroke={nodeColor} strokeWidth="0.75" />
                                <line x1="100" y1="40" x2="120" y2="52" stroke={nodeColor} strokeWidth="0.75" />
                                <line x1="68" y1="75" x2="52" y2="70" stroke={nodeColor} strokeWidth="0.75" />
                                <line x1="132" y1="75" x2="148" y2="70" stroke={nodeColor} strokeWidth="0.75" />
                                <line x1="80" y1="85" x2="60" y2="105" stroke={nodeColor} strokeWidth="0.75" />
                                <line x1="120" y1="85" x2="140" y2="105" stroke={nodeColor} strokeWidth="0.75" />
                                <line x1="100" y1="122" x2="75" y2="135" stroke={nodeColor} strokeWidth="0.75" />
                                <line x1="100" y1="122" x2="125" y2="135" stroke={nodeColor} strokeWidth="0.75" />
                                <line x1="75" y1="135" x2="100" y2="165" stroke={nodeColor} strokeWidth="0.75" />
                                <line x1="125" y1="135" x2="100" y2="165" stroke={nodeColor} strokeWidth="0.75" />
                            </g>

                            {/* Landmark Nodes */}
                            <g opacity="0.9">
                                <circle cx="100" cy="40" r="2.5" fill={nodeColor} />
                                <circle cx="80" cy="52" r="2.5" fill={nodeColor} />
                                <circle cx="120" cy="52" r="2.5" fill={nodeColor} />
                                <circle cx="80" cy="85" r="2.5" fill={nodeColor} />
                                <circle cx="120" cy="85" r="2.5" fill={nodeColor} />
                                <circle cx="100" cy="122" r="2.5" fill={nodeColor} />
                                <circle cx="75" cy="135" r="2.5" fill={nodeColor} />
                                <circle cx="125" cy="135" r="2.5" fill={nodeColor} />
                                <circle cx="100" cy="140" r="2.5" fill={nodeColor} />
                                <circle cx="100" cy="165" r="2.5" fill={nodeColor} />
                            </g>

                            {/* Eye HUD target brackets */}
                            {driverState !== "Medical Emergency" && (
                                <g opacity="0.6" stroke={nodeColor} strokeWidth="1" fill="none">
                                    <path d="M 64,80 L 64,74 L 70,74" />
                                    <path d="M 96,80 L 96,74 L 90,74" />
                                    <path d="M 64,90 L 64,96 L 70,96" />
                                    <path d="M 96,90 L 96,96 L 90,96" />
                                    <path d="M 104,80 L 104,74 L 110,74" />
                                    <path d="M 136,80 L 136,74 L 130,74" />
                                    <path d="M 104,90 L 104,96 L 110,96" />
                                    <path d="M 136,90 L 136,96 L 130,96" />
                                </g>
                            )}
                        </g>

                        {/* Vector metadata strings */}
                        <g fontFamily="JetBrains Mono" fontSize="6.5" fill={nodeColor} opacity="0.75">
                            <text x="10" y="20">TRACKING_STATUS: RESOLVED</text>
                            <text x="10" y="30">FACIAL_NODES: 68/68 ACTIVE</text>
                            <text x="10" y="180">EAR_RATIO: {eyeHeight / 10}</text>
                            <text x="130" y="180">HEAD_YAW: {headAngle}°</text>
                        </g>
                    </svg>
                </div>
            );
        };

        // Custom Component: Typewriter details description
        const Typewriter = ({ text }) => {
            const [displayedText, setDisplayedText] = useState('');
            
            useEffect(() => {
                setDisplayedText('');
                let i = 0;
                const interval = setInterval(() => {
                    setDisplayedText((prev) => prev + text.charAt(i));
                    i++;
                    if (i >= text.length) {
                        clearInterval(interval);
                    }
                }, 8);
                return () => clearInterval(interval);
            }, [text]);

            return <span>{displayedText}</span>;
        };

        // Custom Component: Rolling Speedometer Telemetry Counter
        const AnimatedCounter = ({ value, duration = 350 }) => {
            const [displayValue, setDisplayValue] = useState(value);
            
            useEffect(() => {
                let startTimestamp = null;
                const startVal = parseFloat(displayValue);
                const endVal = parseFloat(value);
                if (isNaN(endVal) || isNaN(startVal)) {
                    setDisplayValue(value);
                    return;
                }
                
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    const current = startVal + progress * (endVal - startVal);
                    
                    if (Number.isInteger(endVal)) {
                        setDisplayValue(Math.floor(current));
                    } else {
                        setDisplayValue(current.toFixed(3));
                    }
                    
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            }, [value]);

            return <span className="font-mono tracking-wider">{displayValue}</span>;
        };

        // Custom Component: Responsive Canvas-based ECG waves bound to simulator state
        const EcgVisualizer = ({ bpm, driverState, bac }) => {
            const canvasRef = useRef(null);
            const stateStartTimeRef = useRef(Date.now());
            const prevStateRef = useRef(driverState);
            
            useEffect(() => {
                if (prevStateRef.current !== driverState) {
                    stateStartTimeRef.current = Date.now();
                    prevStateRef.current = driverState;
                }
            }, [driverState]);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                let animationId;
                let offset = 0;
                
                const render = () => {
                    if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
                        canvas.width = canvas.clientWidth;
                        canvas.height = canvas.clientHeight;
                    }
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    let color = '#06b6d4'; // Active - Cyan
                    if (driverState === "Drowsy") {
                        color = '#f59e0b'; // Fatigue - Amber
                    } else if (driverState === "Medical Emergency") {
                        color = '#ef4444'; // Medical - Red
                    } else if (bac >= 0.08) {
                        color = '#6366f1'; // Alcohol - Indigo
                    }
                    
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2.5;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                    
                    ctx.beginPath();
                    const midY = canvas.height / 2;
                    const w = canvas.width;
                    
                    // Wave cycle length based on BPM
                    const cycleWidth = Math.max(100, (60 / bpm) * 320);
                    
                    for (let x = 0; x < w; x++) {
                        let cycleX = (x + offset) % cycleWidth;
                        let y = midY;
                        
                        if (driverState === "Medical Emergency") {
                            const timeElapsed = Date.now() - stateStartTimeRef.current;
                            if (timeElapsed < 6000) {
                                // 1. Ventricular Tachycardia phase
                                y = midY + Math.sin(cycleX * 0.16) * 38 + Math.sin(cycleX * 0.35) * 12;
                            } else {
                                // 2. Degraded flatline phase
                                y = midY + (Math.sin(x * 0.05) * 0.8);
                            }
                        } else if (bac >= 0.08) {
                            // Erratic chemical micro-spikes
                            if (cycleX > 15 && cycleX < 30) {
                                let p = (cycleX - 15) / 15;
                                y = midY - Math.sin(p * Math.PI) * 7;
                            } else if (cycleX >= 34 && cycleX < 38) {
                                let q = (cycleX - 34) / 4;
                                y = midY + (q * 10);
                            } else if (cycleX >= 38 && cycleX < 44) {
                                let r = (cycleX - 38) / 6;
                                y = (midY + 10) - (Math.sin(r * Math.PI) * 65);
                            } else if (cycleX >= 44 && cycleX < 49) {
                                let s = (cycleX - 44) / 5;
                                y = midY + (Math.sin(s * Math.PI) * 22);
                            } else if (cycleX >= 58 && cycleX < 78) {
                                let t = (cycleX - 58) / 20;
                                y = midY - Math.sin(t * Math.PI) * 12;
                            }
                            // Inject irregular spikes on flat areas
                            if (cycleX > 100 && cycleX < 105) {
                                y += (Math.random() - 0.5) * 6;
                            }
                        } else {
                            // Standard active vitals PQRST curve
                            if (cycleX > 15 && cycleX < 30) {
                                let p = (cycleX - 15) / 15;
                                y = midY - Math.sin(p * Math.PI) * 7;
                            } else if (cycleX >= 34 && cycleX < 38) {
                                let q = (cycleX - 34) / 4;
                                y = midY + (q * 10);
                            } else if (cycleX >= 38 && cycleX < 44) {
                                let r = (cycleX - 38) / 6;
                                y = (midY + 10) - (Math.sin(r * Math.PI) * 65);
                            } else if (cycleX >= 44 && cycleX < 49) {
                                let s = (cycleX - 44) / 5;
                                y = midY + (Math.sin(s * Math.PI) * 22);
                            } else if (cycleX >= 58 && cycleX < 78) {
                                let t = (cycleX - 58) / 20;
                                y = midY - Math.sin(t * Math.PI) * 12;
                            }
                        }
                        
                        if (x === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    
                    ctx.stroke();
                    
                    offset += Math.max(1.8, bpm / 22);
                    animationId = window.requestAnimationFrame(render);
                };
                
                render();
                
                return () => {

                                            <div>
                                                <span className="text-[9px] text-slate-550 tracking-widest block font-bold font-mono uppercase">SYSTEM READOUT</span>
                                                <span className={`text-xl font-extrabold font-mono tracking-wider ${telemetry.driver_state === 'Active' ? 'text-cyan-400' : (telemetry.driver_state === 'Drowsy' ? 'text-amber-500 animate-pulse' : 'text-red-500 animate-pulse')}`}>
                                                    {telemetry.driver_state.toUpperCase()}
                                                </span>
                                            </div>
                                            <span className={`px-3 py-1 text-[9px] font-extrabold rounded font-mono tracking-widest ${telemetry.driver_state === 'Active' ? 'bg-cyan-950/60 text-cyan-400 border border-cyan-900/40' : (telemetry.driver_state === 'Drowsy' ? 'bg-amber-950/60 text-amber-500 border border-amber-900/40' : 'bg-red-950/60 text-red-500 border border-red-900/40')}`}>
                                                {telemetry.driver_state === 'Active' ? 'NOMINAL' : (telemetry.driver_state === 'Drowsy' ? 'DROWSY' : 'EMERGENCY')}
                                            </span>
                                        </div>
                                    </div>

                                    {/* Biometrics telemetry cards */}
                                    <div className="grid sm:grid-cols-3 gap-4">
                                        
                                        {/* Heart Rate Vitals Card - Synchronized flashing border/glow */}
                                        <div 
                                            id="card-hr" 
                                            className="backdrop-blur-2xl bg-slate-950/20 border rounded-[2rem] p-5 flex flex-col items-center text-center justify-between relative overflow-hidden transition-all duration-300 card-flash-active"
                                            style={hrCardStyle}
                                        >
                                            <div className="absolute top-0 left-0 right-0 h-[1.5px] bg-gradient-to-r from-red-500 to-indigo-500"></div>
                                            
                                            {/* Synced Heart Icon */}
                                            <span className="text-[9px] text-slate-550 tracking-widest font-mono font-bold uppercase flex items-center gap-1.5">
                                                CARDIAC PULSE
                                                <span 
                                                    className="text-red-500 heart-beat-active" 
                                                    style={heartIconStyle}
                                                >
                                                    ♥
                                                </span>
                                            </span>
                                            
                                            <div className="my-3 flex items-baseline gap-1">
                                                <span className="text-4xl font-extrabold text-white font-mono"><AnimatedCounter value={telemetry.heart_rate} /></span>
                                                <span className="text-[9px] text-slate-555 font-bold font-mono">BPM</span>
                                            </div>
                                            
                                            <span className={`text-[9px] px-2 py-0.5 rounded font-mono font-bold tracking-wider ${telemetry.heart_rate > 100 || telemetry.heart_rate < 50 ? 'bg-red-950/40 text-red-400 border border-red-900/40 animate-pulse' : 'bg-cyan-950/40 text-cyber-cyan border border-cyan-900/40'}`}>
                                                {telemetry.heart_rate > 100 ? 'TACHYCARDIA' : (telemetry.heart_rate < 50 ? 'BRADYCARDIA' : 'NOMINAL')}
                                            </span>
                                            <span className="text-[8px] text-slate-600 mt-2 font-mono tracking-wider">Continuous galvanic sinus sweep</span>
                                        </div>

                                        {/* Blood pressure */}
                                        <div className={`backdrop-blur-2xl bg-slate-950/20 border rounded-[2rem] p-5 flex flex-col items-center text-center justify-between relative overflow-hidden transition-all duration-300 ${telemetry.driver_state === 'Active' ? 'border-white/10 hover:border-cyan-500/40 hover:shadow-[0_0_20px_rgba(6,182,212,0.1)]' : (telemetry.driver_state === 'Drowsy' ? 'border-amber-500/30 shadow-[0_0_15px_rgba(245,158,11,0.155)]' : 'border-red-500/40 shadow-[0_0_20px_rgba(239,68,68,0.155)]')}`}>
                                            <div className="absolute top-0 left-0 right-0 h-[1.5px] bg-gradient-to-r from-cyan-500 to-emerald-500"></div>
                                            <span className="text-[9px] text-slate-550 tracking-widest font-mono font-bold uppercase">ARTERIAL PRESSURE</span>
                                            
                                            <div className="my-3 flex items-baseline gap-1">
                                                <span className="text-3xl font-extrabold text-white font-mono">{telemetry.blood_pressure_sys}/{telemetry.blood_pressure_dia}</span>
                                                <span className="text-[8px] text-slate-555 font-bold font-mono">mmHg</span>
                                            </div>

                                            <span className={`text-[9px] px-2 py-0.5 rounded font-mono font-bold tracking-wider ${telemetry.blood_pressure_sys < 95 ? 'bg-amber-950/40 text-amber-500 border border-amber-900/40' : 'bg-emerald-950/30 text-emerald-400 border border-emerald-900/30'}`}>
                                                {telemetry.blood_pressure_sys < 95 ? 'HYPOTENSIVE' : 'OPTIMAL'}
                                            </span>
                                            <span className="text-[8px] text-slate-600 mt-2 font-mono tracking-wider">Real-time hemodynamic pulse estimation</span>
                                        </div>

                                        {/* Alcohol index MQ-3 */}
                                        <div className={`backdrop-blur-2xl bg-slate-950/20 border rounded-[2rem] p-5 flex flex-col items-center text-center justify-between relative overflow-hidden transition-all duration-300 ${telemetry.bac >= 0.08 ? 'border-red-500/50 shadow-[0_0_20px_rgba(239,68,68,0.15)]' : 'border-white/10 hover:border-amber-500/40 hover:shadow-[0_0_20px_rgba(245,158,11,0.1)]'}`}>
                                            <div className="absolute top-0 left-0 right-0 h-[1.5px] bg-gradient-to-r from-amber-500 to-yellow-500"></div>
                                            <span className="text-[9px] text-slate-550 tracking-widest font-mono font-bold uppercase">ALCOHOL (BAC)</span>
                                            
                                            <div className="my-3 flex items-baseline gap-1">
                                                <span className="text-4xl font-extrabold text-white font-mono"><AnimatedCounter value={telemetry.bac} /></span>
                                                <span className="text-[9px] text-slate-555 font-bold font-mono">%</span>
                                            </div>

                                            <span className={`text-[9px] px-2 py-0.5 rounded font-mono font-bold tracking-wider ${telemetry.bac >= 0.08 ? 'bg-red-950/40 text-red-400 border border-red-900/40 animate-pulse' : 'bg-emerald-950/30 text-emerald-400 border border-emerald-900/30'}`}>
                                                {telemetry.bac >= 0.08 ? 'OVER LIMIT' : 'CLEAN'}
                                            </span>
                                            <span className="text-[8px] text-slate-600 mt-2 font-mono tracking-wider">Automated pre-drive vapor analysis</span>
                                        </div>
                                    </div>

                                    {/* ECG Component */}
                                    <EcgVisualizer bpm={telemetry.heart_rate} driverState={telemetry.driver_state} bac={telemetry.bac} />
                                </div>
                            </div>
                        )}
                        
                        {/* Rolling Live system Console Output (Always rendered at bottom) */}
                        <ConsoleLogStream driverState={telemetry.driver_state} bac={telemetry.bac} />
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-slate-900/60 py-6 text-center text-xs text-slate-650 font-mono">
                        SAFEWARE ENTERPRISE CONTROL HUB v2.5 — SECURITY PROTOCOLS ENFORCED.
                    </footer>
                </div>
            );
        };

        // Render React DOM App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
